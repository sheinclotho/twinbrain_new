# TwinBrain V5 配置文件
# ===================
# 所有超参数均附有科学依据注释。
# 「建议」代表在典型神经影像场景下经验验证的起始值，可根据设备内存/数据量微调。

# ──────────────────────────────────────────────────────────────────────────
# 一、数据配置
# ──────────────────────────────────────────────────────────────────────────
data:
  # 数据根目录 - 修改为你的数据路径
  root_dir: "F:/twinbrain_v3/test_file3"
  
  # 要处理的模态
  modalities: ["eeg", "fmri"]
  
  # 任务名称列表 (null = 自动发现每个被试下所有任务; [] = 不过滤; ["rest","wm"] = 指定任务)
  # 每个 (被试, 任务) 组合生成一个图样本，多任务可显著增加训练数据量。
  tasks: null

  # task: (已弃用，请改用 tasks) 单任务名称；若 tasks 未设置则作为回退。
  task: null

  # EEG 任务 → fMRI 任务 显式映射（1:N 对齐场景）
  # ─────────────────────────────────────────────────────────────────────────
  # 适用场景：同一 fMRI 扫描对应多个 EEG 条件（典型例子见下方）。
  #
  # ★ ON/OFF 实验范式自动检测（无需配置此项）：
  #   若 EEG 任务名以 "ON" 或 "OFF" 结尾（如 CBON、CBOFF、ECON、ECOFF），
  #   系统会先尝试直接匹配同名 fMRI，若未找到则自动剥离后缀重试：
  #     CBON → CB, CBOFF → CB, ECON → EC, ECOFF → EC
  #     GRADON → GRAD, GRADOFF → GRAD, EOON → EO, EOOFF → EO
  #   无需任何配置，直接将此项保持 null 即可。
  #
  # 仅在以下情况才需要显式配置此项：
  #   • ON/OFF 后缀的基础名与 fMRI 任务名不一致（自动剥离的结果不正确）
  #   • 使用其他命名约定（如 GRADON→GRAD_run-2 这类非自动可推断的映射）
  #
  # 配置后的行为变化：
  #   1. 加载 fMRI 时优先按映射后的任务名查找，而非 EEG 任务名（显式 > 自动检测 > 回退）。
  #   2. 自动任务发现（tasks: null）仅扫描 EEG 文件，避免 fMRI-only 任务
  #      被当作独立 run 加载（无 EEG 配对则产生无跨模态边的单模态图）。
  #
  # 示例（手动覆盖自动检测结果，强制 CBON/CBOFF → CB）：
  #   fmri_task_mapping:
  #     CBON: CB
  #     CBOFF: CB
  #     ECON: EC
  #     ECOFF: EC
  #
  # 1:1 标准场景（EEG 任务名 == fMRI 任务名，如 rest_eeg + rest_bold）：保持 null 即可。
  fmri_task_mapping: null

  # fMRI 条件时间段截取（防止跨条件边界时序学习）
  # ─────────────────────────────────────────────────────────────────────────
  # 适用场景：多个 EEG 条件（如 GRADON/GRADOFF）共享同一 fMRI 运行（如 task-CB），
  # fMRI 文件按条件顺序包含完整会话的时序数据：
  #   t=0..T₁ TRs → 条件 1（如 GRADON）
  #   t=T₁..T₂ TRs → 条件 2（如 GRADOFF）
  #
  # ★ 为什么需要此配置（重要！）：
  #   若不截取，会产生两类时序污染错误：
  #   1. 非窗口模式（max_seq_len=300）：两个条件都从 t=0 开始截断，
  #      GRADOFF 错误地使用 GRADON 时段的 fMRI 数据，学习错误的连接结构。
  #   2. 窗口模式：滑动窗口会跨越条件边界（如 t=275-325 包含 GRADON 末尾
  #      和 GRADOFF 开头），预测损失被迫"预测"实验条件切换而非神经动态，
  #      导致模型学到虚假的时序规律（如 t=300 后 BOLD 信号突变）。
  #
  # 配置格式（单位：TR，含左不含右）：
  #   fmri_condition_bounds:
  #     <EEG任务名>: [起始TR, 终止TR]
  #
  # 示例（GRADON/GRADOFF 各对应 CB fMRI 前后 150 TRs，TR=2s）：
  #   fmri_condition_bounds:
  #     GRADON: [0, 150]     # TR 索引 0-149（会话开始后 0-300s）→ GRADON 条件
  #     GRADOFF: [150, 300]  # TR 索引 150-299（会话开始后 300-600s）→ GRADOFF 条件
  #   注：索引均为从 0 开始的累计 TR 编号（含左不含右），与 Python 切片语义一致。
  #
  # 如何确定 TR 边界：
  #   1. 查阅实验设计文档（最准确）
  #   2. 查看 BIDS events.tsv 文件中的 onset/duration
  #   3. 经验估算：total_TRs = fMRI_TR_count（可用 `fslhd bold.nii` 查看），
  #      若两个条件等时长，boundary = total_TRs / 2
  #
  # null（默认）：不截取，使用完整 fMRI 时间序列。
  #   1:1 标准场景（每个 EEG 任务有独立对应的 fMRI 文件）请保持 null。
  #   ON/OFF 共享 fMRI 场景**强烈建议**配置此项，否则存在时序污染风险。
  fmri_condition_bounds: null

  # 最大被试数 (用于测试, 0 或 null 表示处理所有)
  max_subjects: 0

  # Atlas配置（fMRI 空间分区）
  # Schaefer200: 200 ROI，性价比最高；400 ROI 精度更高但内存翻倍
  atlas:
    name: "schaefer200"
    file: "atlases/Schaefer2018_200Parcels_7Networks_order_FSLMNI152_1mm.nii"
    label_file: "atlases/schaefer200_mask_ready.json"

  # DTI 结构连通性边（可选）
  # ─────────────────────────────────────────────────────────────────────────
  # 设为 true 时，若被试目录下存在预计算的 DTI 连通性矩阵文件，则在 fMRI 节点上
  # 额外建立一套结构连通性边 ('fmri','structural','fmri')，使编码器同时利用：
  #   • ('fmri','connects','fmri')   — fMRI 时序相关（功能连通性）
  #   • ('fmri','structural','fmri') — DTI 白质纤维束（结构连通性）
  #
  # 支持的矩阵文件命名（BIDS兼容，放在被试任意子目录下）：
  #   sub-XX_*connmat*.npy  /  sub-XX_*connmat*.csv  /  sub-XX_*connmat*.tsv
  #   sub-XX_*connectivity*.npy / .csv
  #
  # DTI 预处理需要外部工具，本系统只读取其输出矩阵（[N_rois, N_rois]）。
  # 矩阵尺寸必须与 fMRI 图谱 ROI 数量完全一致（如 Schaefer200 → 200×200）。
  #
  # 如何生成（推荐流程）：
  #   ① 纤维跟踪（MRtrix3 示例）：
  #      tckgen dwi.mif tracks.tck -algorithm iFOD2 -select 1M
  #      tcksift2 tracks.tck fod.mif weights.txt  # SIFT2 权重归一化（推荐）
  #   ② 图谱分区（MRtrix3，与 fMRI 使用同一 atlas）：
  #      tck2connectome tracks.tck Schaefer200.nii connmat.csv \
  #          -tck_weights_in weights.txt -stat_edge mean
  #   ③ 保存（Python）：
  #      import numpy as np
  #      mat = np.log1p(np.loadtxt('connmat.csv', delimiter=','))  # log1p 归一化
  #      np.save('sub-01_connmat.npy', mat.astype('float32'))
  #
  #   Dipy 替代方案（参见 dipy.tracking.utils.connectivity_matrix）：
  #      from dipy.tracking.utils import connectivity_matrix
  #      M, grouping = connectivity_matrix(streamlines, affine, label_volume,
  #                                        return_mapping=True)
  #      np.save('sub-01_connmat.npy', M.astype('float32'))
  #
  # false（默认）：不使用 DTI，与旧版本行为一致。
  dti_structural_edges: false

  # 图缓存配置
  # 每个 (被试, 任务) 的异质图构建完成后自动保存为 .pt 文件。
  # 再次运行时直接加载，无需重新预处理，节省数分钟到数十分钟。
  # 缓存文件名包含配置哈希，修改图参数后自动失效并重建。
  cache:
    enabled: true
    dir: "outputs/graph_cache"

# ──────────────────────────────────────────────────────────────────────────
# 二、模型结构
# ──────────────────────────────────────────────────────────────────────────
model:
  # 模型类型
  type: "v5_optimized"
  
  # 隐层特征维度（H）
  # 建议：
  #   8 GB GPU  → 64（安全）或 128（标准）
  #   16 GB GPU → 128 或 256
  # 每翻倍大约占用 4× 内存（STGCN 时序循环的中间激活）。
  hidden_channels: 128
  
  # 编码器层数（ST-GCN 堆叠深度）
  # 建议：4。增加至 6 对小数据集（<100 样本）通常过拟合。
  num_encoder_layers: 4
  
  # 解码器层数（时序卷积深度）
  # 建议：3。用于信号重建，比编码器浅足矣。
  num_decoder_layers: 3
  
  # 是否启用潜空间预测头
  # true：编码器潜向量的前 2/3 → 预测后 1/3，给预测头真正的梯度信号。
  use_prediction: true
  
  # 预测步数（T_future = T × 1/3 与此参数的最小值）
  # ─────────────────────────────────────────────────────────────
  # 科学含义：
  #   fMRI（TR=2s）：当前窗口 T_fut=17 TRs，prediction_steps > 17 的多余步骤由
  #     `aligned_steps = min(pred_steps, T_fut)` 自动截断，不产生错误梯度。
  #   EEG（250Hz）：当前窗口 T_fut=167 pts，50 步 × 4ms = 200ms，覆盖 alpha 节律
  #     完整周期（80-125ms）和 theta 节律（125-250ms），是预测 EEG 的最有意义的窗口。
  #
  # ★ V5.45 模态物理一致性分析：
  #   EEG 250Hz：
  #     • context = T_ctx × (1/250s) = 333 × 4ms = 1.33s（覆盖 alpha 10+ 周期）
  #     • prediction = 50 × 4ms = 200ms（1.5 个 alpha 周期，评估方差合理）
  #     • 全量监督（50 ≤ T_fut=167）：每步梯度有效
  #   fMRI 0.5Hz（TR=2s）：
  #     • context = 33 × 2s = 66s（覆盖完整 HRF 响应 ~12s，含 6-8 个 BOLD 波形）
  #     • prediction = 17 × 2s = 34s（完整 HRF 覆盖，足够评估血动力学预测）
  #     • ★ V5.45 效率修复：compute_loss 和 validate 现在传递 num_steps=min(50, T_fut)
  #       给 predict_next()，避免生成 33 个无监督的 fMRI 预测步（节省 ~66% fMRI 预测计算）
  #
  # ★ 为什么不同模态需要不同的有效预测长度？
  #   EEG 高频动态（ms 量级）：短程自回归（1-5 步）已很准确，
  #     但 R² 评估需要足够的步数来区分"平均预测"和"真正学到"的模型。
  #     50 步确保每次评估有足够的时间跨度。
  #   fMRI 慢波动态（s 量级）：17 步 × 2s = 34s 已是合理的预测视界。
  #     超过 34s 的预测需要更长的 context 窗口才有意义。
  prediction_steps: 50
  
  # Dropout 比率
  # 建议：0.1（大数据集）；0.2（2-8 被试小数据集，防止过拟合）。
  # V5.44：提高至 0.2 以增强对 2 被试场景的正则化。
  dropout: 0.2
  
  # 损失函数类型
  # mse: 均方误差，对离群值敏感。
  # huber: 对大误差用 L1，小误差用 MSE（推荐，对 EEG 高振幅尖峰鲁棒）。
  # smooth_l1: 与 huber 类似（delta=1）。
  loss_type: "huber"

  # 自迭代图结构学习（动态功能连接，Graph Structure Learning）
  # ─────────────────────────────────────────────────────────────
  # false（默认）：图拓扑固定为预处理时估计的相关矩阵（后向兼容）。
  # true：每个 ST-GCN 编码层内，从当前节点特征动态推算软邻接矩阵
  #       （余弦相似度 + top-k 稀疏化），与固定拓扑按可学习权重 α 混合。
  #
  # 科学依据：功能连接是动态的（Hutchison et al. 2013, NeuroImage），
  #           图结构应随认知状态实时重构，而非静态固定。
  # ML 参考：AGCRN (Bai et al. 2020), StemGNN (Cao et al. 2020)。
  #
  # 代价：每层多一次 [N, H//2] 矩阵乘法 (N≈200, H//2≈64 → 约 0.05ms)。
  # 建议：研究场景开启（true）；计算资源紧张时关闭（false）。
  use_dynamic_graph: true
  k_dynamic_neighbors: 10  # 动态图每节点保留的 k 近邻数（建议：fMRI 10，EEG 5）

  # 频域重建损失（频谱损失）
  # ─────────────────────────────────────────────────────────────────────────
  # 在时域 Huber/MSE 重建损失之外，额外计算信号的 FFT 幅度谱 MSE。
  #
  # 科学依据：EEG 信号具有特征性节律频段（theta 4-7Hz、alpha 8-12Hz、
  # beta 13-30Hz）；fMRI BOLD 信号具有慢波动（~0.01-0.1Hz）。
  # 仅用时域损失的模型可能忽略频率结构，导致重建信号的功率谱偏移。
  # 频谱损失直接约束功率谱，显著改善 pred_r2_eeg（尤其在震荡信号预测场景）。
  #
  # 实现：对重建信号和目标信号分别做 rfft（沿时间轴），
  # 比较幅度谱（绝对值），不约束相位（相位噪声大，强约束会破坏训练稳定性）。
  # 损失值按 T 归一化，保证与时域损失同数量级（Parseval 定理：Σ|X[k]|² = T·σ²）。
  #
  # true：同时使用时域 + 频域损失，对震荡信号预测效果更好（但会增加梯度竞争）。
  # false（推荐）：仅使用时域损失。
  # 注意：在小样本数据集（4-8 被试）上，spectral 任务与 pred 任务竞争梯度预算，
  # 经验表明关闭 spectral loss 后 pred_r2 反而更稳定。如需频域监督，可设为 true。
  use_spectral_loss: false

  # 时序分块大小（时序消息传递峰值显存控制）
  # ─────────────────────────────────────────────────────────────────────────
  # SpatialTemporalGraphConv 在反向传播重计算（梯度检查点）时，会将整个序列
  # T 个时间步的消息张量一次性实例化：大小 [T × E × H]。
  #
  # 问题根因（AGENTS.md §三 [2026-02-28] 累积 OOM）：
  #   1. 每步分配并释放 [T×E, H] 大块张量→ CUDA 分配器空闲列表碎片化；
  #   2. 每个 epoch 均有碎片残留（旧代码仅在验证时调用 empty_cache()）；
  #   3. 多个 epoch 后碎片累积到无法满足下一次大块分配→ OOM；
  #   4. 每次"修复"只减小单步峰值，推迟而非消除碎片→OOM epoch 从第10轮
  #      推移到第47轮。
  #
  # 本参数解法：将 T 切分为若干 chunk_size 大小的块，每块独立 propagate()，
  # 峰值显存从 O(T×E×H) 降至 O(chunk_size×E×H)，与此同时每 epoch 后
  # 调用 gc.collect()+empty_cache() 防止碎片积累。
  #
  # ★ V5.45 重要更新：智能自适应分块策略
  # ─────────────────────────────────────────────────────────────
  # 旧问题：temporal_chunk_size=32 + EEG(T=500) = 每层 16 次 propagate()
  # 调用（Python-GPU round-trip），而 GPU 只用到 0.16/8 GB = 2% 利用率。
  # Python 循环 overhead 是训练慢（200s/epoch）的根本原因，不是 GPU 计算。
  #
  # 新策略（代码层面已实现，无需用户配置）：
  #   • use_gradient_checkpointing=False（默认）：
  #     不做分块（chunk_size = T），单次 propagate() 调用。
  #     原因：无 checkpointing 时 autograd 无论如何都会存储全部 T 步激活，
  #     分块不减少内存，只增加 Python 循环 overhead。
  #     预期提速：EEG T=500 时从 16 次降至 1 次 → ~10× Python overhead 减少
  #   • use_gradient_checkpointing=True（OOM 时启用）：
  #     使用本参数值作为分块大小，按块重计算 backward，实现真正的内存节省。
  #
  # 配置建议：
  #   null（推荐）→ 不分块（T 作为 chunk_size），单次 propagate() 调用，最快。
  #              use_gradient_checkpointing=True 时 backward 内存 = T×E×H 但仅
  #              1 次 gradient_checkpoint 重计算（vs chunk=64 的 8 次）→ 仍比 64 快 8×。
  #              use_gradient_checkpointing=False 时无区别（autograd 已存全部激活）。
  #   64   → EEG 8 块 / fMRI 1 块，适合显存 < 4GB 或极端 OOM 场景。
  #   32   → EEG 16 块 / fMRI 1 块，适合 < 3GB 极端内存受限场景。
  #
  # ⚠ V5.47 陷阱（已修复，回退到 null）：
  #   V5.47 曾将此值设为 64（配合 use_gradient_checkpointing=true），本意是节省内存。
  #   但这引入了 8× Python overhead（每层 8 次 propagate() 调用 vs 1 次）。
  #   正确做法：null（单次调用）+ checkpointing=true（GC 保护 backward 峰值），见 V5.48 修复。
  #   V5.49 追记：checkpointing=false 时 backward 峰值 ≈ 11.6 GB → 8GB GPU OOM，故不可关闭 GC。
  temporal_chunk_size: null  # 推荐：单次 propagate() 调用，最快；极端 OOM 时改为 64（+8× Python overhead）

  # 跨模态潜空间对齐损失（Cross-Modal Latent Alignment，V5.43 新增）
  # ─────────────────────────────────────────────────────────────────────────
  # 对编码后的 EEG 和 fMRI 全局均值表示施加余弦相似度损失，直接优化跨模态
  # 潜空间对齐质量。这解决了一个核心问题：EEG→fMRI 预测依赖跨模态边的
  # 图传播，但图边仅提供拓扑信息，不直接约束两个模态在潜空间的距离。
  #
  # 科学依据：
  #   • 神经血管耦合（Logothetis et al. 2001, Nature）：EEG gamma 频段功率
  #     与局部 BOLD 信号线性相关，两者在同一认知状态下共享潜在神经信号源
  #   • 对比多视角编码（CMC, Tian et al. 2019 NeurIPS）：不同模态的同一内容
  #     在学习后的表示中应保持近邻关系
  #   • 脑动力学自监督学习（Thomas et al. 2022）：跨模态对齐直接改善
  #     EEG→fMRI 预测的泛化能力
  #
  # 实现：1 − cosine_similarity(mean_pool(h_eeg), mean_pool(h_fmri))
  # 梯度流经两个模态的编码器路径，同时优化 EEG 和 fMRI 的潜空间方向。
  #
  # true（推荐，V5.43 默认）：启用，改善跨模态预测准确率。
  # false：关闭（恢复 V5.42 行为）。
  use_cross_modal_align: true

  # 预测步指数加权系数（Temporal Step Weighting Gamma，V5.43 新增）
  # ─────────────────────────────────────────────────────────────────────────
  # 对预测损失中不同步骤施加指数递增权重：步骤 t 的权重为
  #   w(t) = exp(gamma × t / (T_fut - 1))，归一化到均值=1
  # 步骤 0（近期，容易）权重最低；步骤 T_fut-1（远期，困难）权重最高。
  #
  # 科学依据：
  #   • 大脑对时序预测使用多层级表示（Hasson et al. 2015, Trends in Cog Sci）
  #   • 时序模型的课程学习：先学近期预测，逐步加强远期监督（Bengio et al. 2015）
  #   • 均匀权重导致模型过拟合近期步（容易，梯度主导），忽视远期步（难但关键）
  #
  # 0.0：均匀权重（恢复 V5.42 行为）
  # 1.0：exp(0) ~ exp(1) ≈ 1.0 ~ 2.72（V5.43 默认，温和加权）
  # 2.0：exp(0) ~ exp(2) ≈ 1.0 ~ 7.4（强调远期步，适合长序列预测）
  pred_step_weight_gamma: 1.0

  # 会话/run 嵌入（V5.44 跨会话预测支持）
  # false（默认）：禁用会话嵌入，行为与 V5.43 一致
  # true：为每条 run（扫描会话）学习独立的潜空间偏移，捕捉跨会话漂移
  #        （扫描器噪声、疲劳、认知状态变化）。
  #        run_idx 从 build_graphs() 自动分配，无需手动设置。
  #        参数量：num_runs × hidden_channels（典型 6 × 128 = 768 个参数，极小）。
  #        适用场景：多个独立 EEG/fMRI 会话的跨会话预测和知识迁移。
  #        注意：启用后，若需加载旧 checkpoint 需指定 strict=False。
  use_run_embed: false

  # InfoNCE对比预测损失（V5.47 突破性改进）
  # ─────────────────────────────────────────────────────────────────────────
  # 在MSE/Huber回归损失之外，增加信息噪声对比估计(InfoNCE)损失。
  # 核心作用：防止"均值预测崩塌"——模型通过预测未来信号的无条件均值来
  # 最小化MSE（低MSE但pred_r2≤0）。InfoNCE要求模型在所有(节点×时间步)
  # 候选中识别出正确的未来表示，迫使预测头产生可区分的特异性表示。
  # 科学类比：与CLIP(视觉-语言对比学习)和wav2vec 2.0(语音对比学习)相同原理。
  # 参考文献：Oord et al. (2018) CPC; Baevski et al. (2020) wav2vec 2.0.
  use_info_nce: true
  # InfoNCE温度参数τ（越小=越判别性，但更难优化）
  # 0.1 = 原始 SimCLR/wav2vec 默认值，但对脑信号（小数据集）过于激进：
  #   n_items_fmri = 190节点×17步 = 3230，loss_scale ≈ log(3230)/0.1 ≈ 81
  #   warmup 期间（前10 epoch）权重固定，pred_nce priority=4.0 时：
  #   InfoNCE effective 梯度 ≈ 4.0×81 = 324 vs pred_sig ≈ 6.0×1.0 = 6 → 50× 压制
  #   结果：predictor 学会"区分"但不学会"准确预测"→ pred_r2_h1_fmri 下降
  # 0.5（当前推荐值，配合 pred_nce priority=2.0）：
  #   loss_scale ≈ log(3230)/0.5 ≈ 16，effective = 2.0×16 = 32 vs pred_sig = 6 → 5× 比例（可接受）
  # 若 pred_r2 持续出现告警，可进一步调高至 1.0 或关闭 use_info_nce: false
  info_nce_temperature: 0.5

# ──────────────────────────────────────────────────────────────────────────
# 三、训练配置
# ──────────────────────────────────────────────────────────────────────────
training:
  # 训练轮数
  # 建议：50–100（小数据集）；200（大数据集或启用 dFC 窗口后）。
  num_epochs: 100
  
  # 批次大小（当前实现每步一个图）
  batch_size: 1
  
  # 初始学习率
  # 建议：3e-4（小数据集 2-8 被试，更快收敛）；1e-4（大数据集）。
  # V5.44：提高至 3e-4 以在余弦退火第一阶段获得更快的损失下降，
  # 避免前 25 个 epoch 仍在收敛而 pred_r2 停滞。
  # 若 loss 震荡，尝试 1e-4；若 loss 在前 5 epoch 不下降，尝试 5e-4。
  learning_rate: 0.0003
  
  # 权重衰减（L2 正则化）
  # 建议：1e-5。小数据集可提高到 1e-4。
  weight_decay: 0.00001
  
  # 启用自适应损失平衡（GradNorm 变体）
  # true：自动平衡 recon_eeg/recon_fmri/pred_eeg/pred_fmri 的训练速度。
  use_adaptive_loss: true
  
  # 启用 EEG 通道增强（解决静默通道问题）
  use_eeg_enhancement: true
  
  # 启用梯度检查点（节省显存，对长序列必要）
  # 以重新计算换显存：ST-GCN 时序循环每步释放中间激活，防止 CUDA OOM。
  # 代价：约 30–50% 训练速度下降（backward 需重新执行 forward）。
  #
  # ★ temporal_chunk_size 与此参数组合效果：
  #   两者均启用时（GC=True, chunk=64）：
  #   • forward：T/chunk_size 次独立 propagate() 调用（EEG 8次），峰值 ≈ chunk_size×E×H
  #   • backward：gradient_checkpoint 重计算每块 forward，省去整段 T 的激活存储
  #   速度代价：GC 约 +40% backward 时间（重计算）+ 每 chunk 增加少量 Python 开销
  #             EEG T=500, chunk=64：4层×3边×8块=96次 propagate()（vs 12次无分块）
  #             → 总 epoch 时间约慢 2-3×（主要来自 Python-GPU round-trip overhead）
  #             fMRI T=50, chunk=64：T<chunk，仍1次调用，几乎无额外开销
  #   ⚠ 为何 temporal_chunk_size 在 use_gradient_checkpointing=false 时无效：
  #     PyTorch autograd 无论如何都存储全部 T 步的前向激活；分块只是将 1 次大的
  #     propagate() 拆成多次小调用，每次的激活仍然累积，总显存不减。
  #     因此无 GC 时分块仅增加 Python overhead，无任何内存收益（V5.45 设计意图）。
  #
  # 建议（V5.49 修正）：
  #   ⚠ backward 峰值显存分析（windowed_sampling: fMRI T=50, EEG T=500）：
  #     无 GC（false）时，autograd 必须同时存储所有 12 次 propagate() 的激活：
  #       EEG intra × 4层 ≈ 7741 MB（propagate() 激活，不含 boundary tensors）
  #       fMRI intra × 4层 ≈ 3502 MB
  #       Cross-modal × 4层 ≈ 584 MB
  #       合计 propagate 激活 ≈ 11,827 MB；加 attn/residual 等约 11,827+420 = ~12.2 GB → OOM ❌
  #     有 GC（true）+ chunk=null 时，backward 每次只重计算 1 个 propagate()：
  #       峰值 = 单次 EEG intra propagate 激活(1935MB) + boundary tensors(192MB) ≈ ~2.1 GB ✅
  #       （boundary tensors = 两端节点特征张量，GC 边界处需保留作为重计算输入）
  #   ✅ 8GB GPU 默认（必须）→ true + temporal_chunk_size=null
  #      （12 次 propagate()，无 Python 分块开销；GC 使 backward 峰值从 ~12.2GB 降至 ~2.1GB）
  #      速度代价：约 +40% backward 时间（重计算）；比 chunk=64 快 8× 以上。
  #   ✅ 16GB/32GB GPU → false（无重计算，最快；backward 峰值 ~12.2GB < 16GB）
  #   ⚠ 遭遇 CUDA OOM 且 GC=True 仍不足（如多被试大 batch）：
  #      设 temporal_chunk_size=64（峰值降至 ~440MB，但 8× Python overhead）
  #   注意：若仅设 temporal_chunk_size=64 但 use_gradient_checkpointing=false，
  #         分块仅增加 Python overhead，无内存收益（V5.45 规则）。
  use_gradient_checkpointing: true  # 8GB GPU 必须为 true（backward 峰值 ~2.1GB；false≈12.2GB→OOM）；16GB+ 可改 false 提速

  # 最大序列长度（单样本模式，windowed_sampling.enabled: false）
  # ─────────────────────────────────────────────────────────────
  # 截断到此长度再构建图，防止 CUDA OOM。
  # 建议：300（8 GB GPU）；600（16 GB GPU）。
  # ★ windowed_sampling.enabled: true 时此参数自动忽略（图从完整序列构建，
  #   训练样本由窗口大小决定，内存由 window_size 而非完整序列长度决定）。
  max_seq_len: null  # windowed_sampling 开启时用 null；单样本模式下用 300
  
  # 启用学习率调度器（10–20% 更快收敛）
  use_scheduler: true
  # 调度器类型：cosine（推荐）/ onecycle / plateau
  # cosine：先线性预热，再余弦退火重启——对神经影像小数据集最稳定。
  scheduler_type: "cosine"
  
  # 梯度裁剪阈值（防止梯度爆炸）
  # 建议：1.0（Adam 系列标准）。
  max_grad_norm: 1.0
  
  # 梯度累积步数（等效增大批次大小，不增加内存）
  # ─────────────────────────────────────────────────────────────────────────
  # 默认 1 = 标准单步更新（后向兼容）。
  # 设为 N 时，每 N 步才执行一次 optimizer.step()，等效 batch_size = N × 1 = N。
  # loss 自动除以 N，梯度期望不变，幅度与单步一致。
  #
  # 科学依据：更大的等效 batch_size 减少梯度估计方差（Goodfellow et al. 2016 Ch.8）。
  # 对 N<100 样本的神经影像数据集，推荐 gradient_accumulation_steps=4（等效 batch=4）。
  # 建议：4（小数据集）；2（中等数据集）；1（大数据集）。
  gradient_accumulation_steps: 4  # 小数据集（<100样本）推荐 4；大数据集用 1

  # CUDA 显存碎片化周期清理间隔（步数）
  # ─────────────────────────────────────────────────────────────────────────
  # 每 N 个训练步骤（在梯度累积边界处）调用 gc.collect() + empty_cache()，
  # 防止 CUDA 分配器空闲列表碎片在 epoch 内积累导致 OOM。
  #
  # 背景（AGENTS.md §三 [2026-02-28]）：
  #   启用 windowed_sampling 后，一个 epoch 可能有 40-80 步（8 被试 × 10 窗口）。
  #   每步分配/释放约 44MB 消息张量（temporal_chunk_size=32），多步累积后
  #   CUDA 空闲列表碎片化，导致后续较大分配失败（OOM），即便 reserved>>allocated。
  #   每 50 步清理一次将碎片积累量限制在 50 步以内（约 50×44MB=2.2GB 上限），
  #   代价约 2-5ms/次（清理本身几乎无开销）。
  #
  # 0 = 禁用 epoch 内清理（每 epoch 边界仍会清理，旧版行为）。
  # 建议：50（4-8 被试）；20（8+ 被试）；0（禁用，兼容测试）。
  cuda_clear_interval: 50

  # 随机权重平均（Stochastic Weight Averaging, SWA）
  # ─────────────────────────────────────────────────────────────────────────
  # SWA 在主训练循环结束后，以固定低学习率继续训练若干 epoch，并对途中权重快照取平均。
  # 通过平均找到比单一 SGD 终点更宽/更平坦的极小值，提升 OOD 泛化 3-8%（Izmailov 2018）。
  #
  # 对神经影像场景特别有价值：测试被试的脑信号分布可能与训练集存在偏差，
  # 更宽的极小值对此类分布偏移更鲁棒。
  #
  # 参考：Izmailov et al. (2018) "Averaging Weights Leads to Wider Optima and
  #       Better Generalization" UAI 2018.
  #
  # false（默认）：不使用 SWA（后向兼容）。
  # true：主训练结束后额外运行 swa_epochs 轮 SWA 训练，结果保存为 swa_model.pt。
  use_swa: false
  # SWA 训练额外轮数（建议：总 epoch 数的 10-20%，例如 100 epoch 训练后 10-20 轮 SWA）
  swa_epochs: 10
  # SWA 学习率 = 初始 LR × swa_lr_ratio（建议：0.01–0.05；太小无法采集多样快照）
  swa_lr_ratio: 0.05
  
  # 验证频率（每 N 个 epoch 做一次验证）
  val_frequency: 5
  
  # 检查点保存频率（每 N 个 epoch 保存一次）
  save_frequency: 10
  
  # 早停耐心（连续 N 次验证无改善则停止）
  # 建议：20（允许 LR 重启后的短暂退步）。
  early_stopping_patience: 20

  # 最佳模型选择标准
  # ─────────────────────────────────────────────────────────────────────────
  # 'pred_r2'  — 最大化各模态预测 R² 的均值（推荐）。
  #              pred_r2 是数字孪生脑的核心能力指标；以此为标准确保保存的
  #              是预测能力最强的模型，而非仅重建损失最低的模型。
  #              早停也以 pred_r2 改善与否判断是否终止。
  # 'val_loss' — 最小化验证总损失（旧行为）。
  #              当损失由自适应权重平衡时，val_loss 受权重比例影响，
  #              可能保存重建精度高但预测能力弱的模型。
  best_model_criterion: 'pred_r2'

  # 时序数据增强（可选）
  # ─────────────────────────────────────────────────────────────────────────
  # 仅在训练阶段应用（model.training=True）；验证/推理时不增强，保证评估一致性。
  # 类型：信号级随机扰动，模拟采集噪声和个体幅度差异，提升泛化性。
  #
  # 科学依据：
  #   神经影像信号本身包含 10-20% 的测量噪声（仪器噪声、呼吸/心跳伪迹）。
  #   噪声注入（noise_std ≤ 0.05）和幅度缩放（scale_range ≤ ±10%）在有效
  #   信号范围内，不会破坏时序相关结构，等效于数据驱动的白噪声鲁棒性测试。
  #   参考：Perez et al. (2017) EEG 数据增强综述；Volpp et al. (2018) 时序增强。
  #
  # 时序遮蔽（time masking，SpecAugment 风格）：
  #   随机将一段连续时间步置零，迫使模型从周围上下文推断该段信号，
  #   等效于 dropout 在时间维度上的推广。增强时序上下文建模能力。
  #   参考：Park et al. (2019) SpecAugment; Thiemann et al. (2021) Brain EEG.
  #   time_mask_max_ratio: 0 = 禁用；0.1 = 随机遮蔽 0~10% 的时间步（推荐）。
  #
  # enabled: true 时，所有启用的增强方法均生效；可分别设为 0 / null 禁用单项。
  augmentation:
    enabled: true
    # 高斯噪声标准差（z-scored 信号下，0.01 ≈ 1% 信号幅度）
    # 建议：0.01（轻度）~ 0.05（较强，适用于低 SNR 数据）
    noise_std: 0.01
    # 随机幅度缩放范围 [min, max]（相对于原始幅度）
    # 建议：[0.9, 1.1]（±10%），或 null 禁用幅度缩放
    scale_range: [0.9, 1.1]
    # 时序遮蔽最大比例（0~1）
    # 建议：0.1（随机遮蔽 0~10% 时间步）；0 = 禁用
    time_mask_max_ratio: 0.1

# ── 时间窗口采样（动态功能连接 dFC 范式）────────────────────────────
# 将每条完整扫描（run）切分为多个重叠时间窗口。
#
# 科学依据（Hutchison 2013; Chang & Glover 2010）：
#   • 图拓扑（edge_index）= 完整 run 的相关性 → 稳定的结构连通性
#   • 节点特征（x）= 窗口切片 → 每窗口 = 一个脑状态快照 = 一个训练样本
#   • 多窗口 × 多被试 × 多任务 = 充足训练数据（n_subjects×n_tasks×n_windows）
#
# ★ 为什么必须启用才能支持 4-8 个被试？
#   禁用时（单样本模式）：每个 run 用完整序列（如 EEG T=75000, fMRI T=190），
#     每步训练产生 [T×E×H] 峰值张量，T=190 时约 263MB（float16），
#     加上梯度/优化器状态，8GB GPU 仅能稳定运行 ≤2 个被试。
#   启用时（窗口模式）：每步只处理 window_size 步（fMRI 50 TRs），
#     峰值张量降至约 [50×E×H]≈44MB，内存压力降低 6×，
#     8GB GPU 可稳定支持 4-8 个被试（每被试约 5-10 个训练窗口/epoch）。
#
# 与朴素截断（max_seq_len）的关键区别：
#   截断 → 丢弃数据，1 样本/run，EEG 连通性估计仅 1.2s（统计不可靠）
#   窗口 → 利用全部数据，N 样本/run，连通性来自完整 run（稳定可靠）
#
# GPU 内存需求估算（fMRI: N=190, E=5700, H=128, 4层, 3边, windowed_sampling=true）：
#   backward 峰值（GC=false）：全部 12 次 propagate() 激活同时存储 ≈ 11,827 MB = 11.6 GB ❌
#   backward 峰值（GC=true, chunk=null）：单次 propagate() 重计算 ≈ 2,127 MB = 2.1 GB ✅
#   backward 峰值（GC=true, chunk=64）：每块 64/500 × EEG propagate ≈ 440 MB ✅（但 8× Python overhead）
#   （OOM 时：确认 use_gradient_checkpointing=true；仍 OOM 则设 temporal_chunk_size=64）
#
# 推荐配置（启用时将 max_seq_len 设为 null）：
#   fmri_window_size: 50   → 50 TRs × TR=2s = 100s ≈ 一个静息脑状态周期
#   eeg_window_size: 500   → 500pts ÷ 250Hz = 2s（覆盖 alpha/beta/gamma 节律）
#   stride_fraction: 0.5   → 50% 重叠 → 约 2× 更多样本（标准 dFC 设置）
windowed_sampling:
  enabled: true           # ★ 默认开启（V5.41）：支持 4-8 被试的关键参数
                          # ⚠ 升级说明（V5.40 → V5.41）：此开关改变了训练行为——
                          #   每个 epoch 的样本数从 N_subjects 增加到 N_subjects × N_windows
                          #   （约 5-10 倍），每步更快但总步数增加；训练时间基本持平。
                          #   如需恢复旧行为（不推荐），设 enabled: false 并设 max_seq_len: 300。
                          # false = 单样本模式（旧版行为，仅适用于 ≤2 被试 + 8GB GPU）
  fmri_window_size: 50    # fMRI 每个窗口的 TR 数（建议 30-100；越小内存越低但时序信息越少）
  eeg_window_size: 500    # EEG 每个窗口的采样点数（建议 250-2000）
  stride_fraction: 0.5    # 步长 = window_size × stride_fraction（0.5 = 50% 重叠）

  # 跨模态时间对齐（实验性功能）
  # false（默认）：各模态使用各自自然时间尺度（intra-modal 预测推荐）
  # true：EEG 窗口大小 = round(fmri_window_size × T_eeg / T_fmri)，
  #        强制 EEG/fMRI 窗口覆盖相同实际时长（跨模态预测时需要）
  #        ⚠ 启用前确认 GPU 内存足够：对齐后 EEG 窗口通常达数千点
  cross_modal_align: false

# ──────────────────────────────────────────────────────────────────────────
# 四、V5 精细优化（高级用户）
# 大多数用户无需修改这一节；系统会使用科学文献验证的默认值。
# ──────────────────────────────────────────────────────────────────────────
v5_optimization:
  # 学习率线性预热 epoch 数（cosine 调度器的第一阶段）
  # 预热期使用 10% → 100% 的线性 LR 斜坡，避免刚初始化时梯度爆炸。
  # 建议：5（约总 epoch 数的 5–10%）。
  warmup_epochs: 5

  # Cosine 调度器首次重启周期（post-warmup epoch 数）
  # ─────────────────────────────────────────────────────────────────────────
  # 首次 LR 重启发生在 warmup_epochs + cosine_T0 轮之后：
  #   warmup=5, cosine_T0=20 → 第 25 轮重启（旧默认值）
  #   warmup=5, cosine_T0=50 → 第 55 轮重启（当前推荐值）
  #
  # 为什么要延迟重启（V5.44）？
  #   EEG pred_r2 在 epoch 5/10/15/20/25 呈现规律震荡（0.151→0.111→0.151→0.134→0.162）。
  #   根因：T_0=20 使得第 25 轮时 LR 重启至最大值，打乱了已收敛的 loss balancer 状态，
  #   导致 pred 任务的梯度权重被重新调整（GradNorm 误判为"训练不平衡"），进而使
  #   pred_r2_eeg 出现规律性下跌。延迟至第 55 轮重启，模型更稳定后再引入 LR 扰动。
  #
  # 建议：
  #   100 epoch 训练 → cosine_T0=50（重启一次，在 epoch 55）
  #   200 epoch 训练 → cosine_T0=80（重启周期加倍，第二次在 epoch 5+80+160=245）
  # T_mult=2 固定（每次重启后周期加倍，渐进退火）。
  cosine_T0: 50

  # 自适应损失平衡（GradNorm 变体）
  adaptive_loss:
    # GradNorm 恢复力系数。较大 → 更激进地平衡各任务训练速度。
    # 建议：1.5（Chen et al. 2018 推荐值）。
    alpha: 1.5
    # 损失权重内部学习率
    # 建议：0.01（原值 0.025 与 CosineAnnealingWarmRestarts 的 LR 重启峰值相互作用，
    # 在重启后的 6 个 epoch 内将 pred_eeg 权重推至 max_weight，导致
    # train_loss 虚假上升和 pred_r2_eeg 崩溃。降至 0.01 使权重变化更平稳）。
    learning_rate: 0.01
    # 每隔多少步更新一次权重（频繁更新会引入噪声）
    # 原值 10 → 每 epoch 约 8 次更新（80步/epoch ÷ 10）；
    # 新值 80 → 每 epoch 约 1 次更新，避免单 epoch 内的过度震荡。
    update_frequency: 80
    # 预热 epoch 数（预热期权重固定为初始值，保证模型先有稳定梯度）
    # 提高至 10（原值 5）：延迟自适应调整的开始，避免模型在早期不稳定时改变预测任务权重。
    warmup_epochs: 10
    # EEG/fMRI 信号能量比（用于初始化权重）
    # 注意：EEG 在 map_eeg_to_graph() 中已逐通道 z-score 归一化，与 fMRI 尺度相同；
    # 因此设为 1:1 即可。若使用未归一化的 EEG 数据，可调低 eeg 值（如 0.02）。
    modality_energy_ratios:
      eeg: 1.0
      fmri: 1.0
    # 各任务类型的初始相对权重（训练开始时的梯度分配比例）。
    # 键为任务名称前缀，匹配规则为 task_name.startswith(key + '_')：
    #   pred     → 预测任务（pred_eeg, pred_fmri, pred_sig_eeg, pred_sig_fmri）
    #   recon    → 重建任务（recon_eeg, recon_fmri）
    #   spectral → 频域重建任务（spectral_eeg, spectral_fmri）
    # 可扩展：未来添加双向预测（bidir_pred_*）时，直接在此添加 bidir_pred 键即可，
    # 无需修改代码。
    #
    # 当前推荐设置（数字越大 = 该类任务初始梯度比重越高）：
    #   侧重预测（数字孪生脑，默认）: pred: 6.0, recon: 1.0, spectral: 0.5
    #   平衡模式（预测与重建并重）:   pred: 3.0, recon: 2.0, spectral: 0.5
    #   侧重重建（自编码器质量优先）:  pred: 1.0, recon: 3.0, spectral: 1.0
    # pred 提高至 6.0（原值 3.0）：预测任务是数字孪生脑的核心指标（pred_r2），
    # 在有限梯度预算下须明确优先，防止重建任务随训练积累而挤占预测梯度。
    task_priorities:
      pred: 6.0
      pred_nce: 2.0   # InfoNCE对比预测（V5.47新增）
                      # ⚠ 稳定性注意：temperature=0.5 时 InfoNCE 初始 loss_scale ≈ 16，
                      #   priority=2.0 → effective 梯度 = 2×16 = 32，
                      #   vs pred_sig effective = 6×1 = 6 → 约 5:1 比例（可接受）。
                      #   若设 4.0（原值）: 4×16=64 vs 6 → 10:1 → warmup 期 pred_r2 可能为负。
      recon: 1.0
      spectral: 0.5
      cross_modal: 0.3  # 跨模态对齐任务初始权重
                       # AdaptiveLossBalancer 通过前缀匹配分配优先级：
                       # name.startswith(key + '_')，因此 key='cross_modal'
                       # 可匹配任务名 'cross_modal_align'（'cross_modal_' 前缀）。
    # 预测任务权重下限（log空间偏移量，防止自适应机制过度削减预测梯度）
    # pred 任务的 log_weight 永远不低于 log(initial_weight) - pred_weight_floor。
    # 即实际权重 ≥ initial_weight × exp(-pred_weight_floor) ≈ initial_weight × 0.6。
    # 设为 0.0 可禁用此保护（恢复原始行为）。
    pred_weight_floor: 0.5
  
  # EEG 通道增强（解决"静默通道"导致的训练退化）
  eeg_enhancement:
    enable_monitoring: true   # 实时监控通道活动（SNR、方差、梯度）
    enable_dropout: true      # 对低活跃通道施加更高 dropout 概率
    enable_attention: true    # 可学习的通道重要性权重
    enable_regularization: true  # 熵+多样性+活动正则化，防止零解崩塌
    # 基础 dropout 比率（自适应 dropout 会在此基础上调整）
    # 建议：0.1–0.2（EEG 静默通道比例较高时可提高）。
    dropout_rate: 0.1
    # 通道注意力隐层维度（过大会过拟合，过小无法区分通道差异）
    attention_hidden_dim: 64
    # 熵正则化权重（鼓励输出分布多样，防止全零预测）
    entropy_weight: 0.01
    # 通道间多样性权重（防止所有通道输出相同波形）
    diversity_weight: 0.01
    # 活动强制权重（惩罚长期静默通道）
    activity_weight: 0.01
  
  # 潜空间预测头配置（EnhancedMultiStepPredictor）
  advanced_prediction:
    # 预测上下文长度（context_length）
    # ─────────────────────────────────────────────────────────────
    # 用于预测的历史时间步数 = 预测头的输入窗口大小。
    # 训练和推理使用完全相同的长度（因果对齐，无数据泄漏）。
    #
    # 科学依据（NPI 范式，NUST 等）：
    #   NPI 方法使用 3 或 70 个时间步的历史预测下一个时间步。
    #   本模型同样支持此范式；通过调节以下两个参数：
    #     context_length=70, prediction_steps=1  → "70步预测1步"（NPI风格）
    #     context_length=200, prediction_steps=10 → "200步预测10步"（长程预测）
    #
    # 默认值 200：
    #   对应 max_seq_len=300 时上下文部分的全部历史（2/3 × 300 = 200 步）。
    #   改为更小的值（如 70）可以用更少历史做预测，训练更稳定但长程信息减少。
    #
    # fMRI (TR=2s, 200步 × 2s = 400秒历史):  建议 context_length=50-200
    # EEG (250Hz, 200步 / 250Hz = 0.8秒历史): 建议 context_length=50-500
    context_length: 200
    # true：多尺度层级预测（粗→细，Transformer + 上采样）
    # 理论基础：大脑对时间信息的处理本身是层级的（Hasson et al. 2015）。
    use_hierarchical: true
    # true：使用 Transformer（长程依赖）；false：使用 GRU（短程、更快）
    # 建议：序列长度 < 100 用 GRU（内存低），> 100 用 Transformer。
    use_transformer: true
    # 不确定性估计头（预留接口，当前版本为后处理工具，不参与训练损失）
    # ─────────────────────────────────────────────────────────────
    # true：在预测头内注册一个 uncertainty_head（Linear → GELU → Linear），
    #       可通过 predictor.predictor(context, return_uncertainty=True) 手动获取
    #       对预测均值的对数方差估计（解释为置信区间大小的代理指标）。
    #
    # ⚠ 当前限制：uncertainty_head 不参与训练损失计算（NLL 损失**未**启用）。
    #   predict_next() 始终以 return_uncertainty=False 调用，
    #   因此 uncertainty_head 参数在训练中不接收梯度，其输出不保证有意义。
    #   若需可靠的不确定性估计，应在完成充分训练后：
    #   1. 手动调用: predictor.predictor(h_ctx, future_steps, return_uncertainty=True)
    #   2. 解读输出 log_var 作为定性置信度参考（非定量校准）
    #
    # false（建议，默认）：不注册 uncertainty_head，节省 ~input_dim×1.5 个参数。
    # 对大多数用户建议保持 false 直到明确需要不确定性量化。
    use_uncertainty: false
    # 时间尺度数（Hierarchical 模式下的粗-中-细层数）
    # 建议：3（2^2, 2^1, 2^0 下采样因子，覆盖不同频率成分）。
    num_scales: 3
    # 采样窗口数（每次 forward 从序列中采样的窗口数量，仅用于预训练/自监督）
    # 建议：3（Stratified 采样覆盖序列首/中/尾）。
    num_windows: 3
    # 窗口采样策略：uniform（均匀）/ random（随机）/ adaptive（重要性加权）
    sampling_strategy: "uniform"
    # 系统级预测传播层数（GraphPredictionPropagator）
    # 含义：预测在图上传播的跳数；2 = 覆盖 2-hop 邻居（A→B→C）
    # 建议：2（小图 N<100）；3（大图 N>200，如 Schaefer400）
    num_prop_layers: 2

# ──────────────────────────────────────────────────────────────────────────
# 五、图构建配置
# ──────────────────────────────────────────────────────────────────────────
graph:
  # fMRI 连通性阈值（Pearson |r| 超过此值才建边）
  # 建议：0.3（Bullmore & Sporns 2009 推荐，保留强连接）。
  # 降低 → 更密集图（内存增加）；提高 → 更稀疏图（可能丢失弱连接信息）。
  threshold_fmri: 0.3
  
  # EEG 连通性阈值
  # 建议：0.2（EEG 整体相关性较 fMRI 低，阈值稍低保留足够连接）。
  threshold_eeg: 0.2
  
  # fMRI K 近邻（每个节点保留最强的 K 条边，确保图连通性）
  # 建议：20（对 200 节点图平均度 ≈ 40，与实证小世界网络吻合）。
  k_nearest_fmri: 20
  
  # EEG K 近邻（EEG 节点数少，邻域更局部）
  # 建议：10（对 64 通道图平均度 ≈ 20）。
  k_nearest_eeg: 10
  
  # 是否添加自环（GNN 消息传递保留自身特征）
  add_self_loops: true
  
  # 是否无向图（脑连接通常双向对称）
  make_undirected: true
  
  # 跨模态距离阈值（mm，用于基于电极坐标的 EEG→fMRI 边建立）
  # 仅当 EEG 电极已通过 MNE 配准到 MNI 坐标系时有效；
  # 否则使用随机连接（connection_ratio）。
  cross_modal_distance_threshold: 30.0

  # EEG 通道间连通性计算方法
  # ─────────────────────────────────────────────────────────────────────────
  # "correlation"（默认）：Pearson 相关系数（时域，快速，后向兼容）。
  # "coherence"：宽带幅度相干性（频域，捕捉 alpha/beta/gamma 神经振荡同步）。
  #
  # 科学依据：相干性（coherence）衡量频域线性耦合，对振荡性神经活动更敏感：
  #   • Alpha (8-12 Hz)：视觉皮层放松态，枕-顶同步
  #   • Beta (13-30 Hz)：运动准备，感觉运动环路同步
  #   • Gamma (30-80 Hz)：认知绑定，局部回路
  # 若数据主要体现神经振荡特征，"coherence" 通常比 "correlation" 产生更有意义的图拓扑。
  #
  # 注意：修改此选项会改变 EEG 图的 edge_index 和 edge_attr；
  #       缓存键自动包含此参数，切换后旧缓存文件自动失效并重建。
  eeg_connectivity_method: "correlation"  # "correlation" 或 "coherence"

  # 跨模态边 Top-k：相关性最高的 fMRI ROI 数量（每个 EEG 电极）
  # ─────────────────────────────────────────────────────────────────────────
  # 默认行为（相关性可计算时）：对每个 EEG 通道保留与 fMRI BOLD 信号
  # 时序相关性最高的 k 个 ROI 作为跨模态邻居，边权重 = |Pearson r|。
  # 神经科学依据：神经血管耦合（Logothetis 2001）使 EEG 高频功率与
  # 局部 BOLD 信号呈线性相关 — 相关性边权让模型优先处理真实 NVC 通路。
  #
  # 建议：5（稀疏，与 k_nearest_eeg=10 的同模态图密度相当）。
  # 增大 → 跨模态连接更密，更多 EEG-fMRI 偶联信息，但可能增加噪声。
  # 降低 → 仅保留最强耦合通路，更保守但更可解释。
  # 注：跨模态边在每次加载缓存时动态重建，修改此值无需清空缓存。
  k_cross_modal: 5

# ──────────────────────────────────────────────────────────────────────────
# 六、消融实验配置（Ablation Study）
# ──────────────────────────────────────────────────────────────────────────
# 消融实验用于量化每个设计决策的贡献，回答"多模态是否真的优于单模态？"
# 建议按以下三种配置分别训练并比较 pred_r2 / decorr_score 指标：
#
#   模式 A（完整多模态，当前默认）：
#     data.modalities: ["eeg", "fmri"]
#     ablation.disable_cross_modal_edges: false
#     → 两路信号 + 跨模态图卷积消息传递，TwinBrain 完整能力
#
#   模式 B（多模态独立，无跨模态连接）：
#     data.modalities: ["eeg", "fmri"]
#     ablation.disable_cross_modal_edges: true
#     → 两路信号独立编码，无 EEG→fMRI 消息传递
#     → 对比 A vs B 可量化跨模态图卷积的贡献
#     → 使用覆盖配置: python main.py --config configs/ablation_no_crossmodal.yaml
#
#   模式 C（单模态 fMRI）：
#     data.modalities: ["fmri"]
#     ablation.disable_cross_modal_edges: false   # 无跨模态边（只有一个模态）
#     → 纯 fMRI，无 EEG 辅助
#     → 对比 A vs C 可量化 EEG 模态的贡献（含跨模态图卷积）
#     → 使用覆盖配置: python main.py --config configs/ablation_fmri_only.yaml
#
# 如何解读消融结果（pred_r2_fmri 对比）：
#   A > B：跨模态图卷积本身有贡献（EEG 的时频信息通过图边传入 fMRI 编码器）
#   A > C：EEG 模态有贡献（即使不加跨模态边，共享训练也能提升 fMRI 预测）
#   A ≈ B ≈ C：跨模态设计无明显增益，可能是数据量不足或 EEG/fMRI 时间对齐误差所致
#   B ≈ C > A：多模态反而有害（梯度干扰，小数据集常见），建议检查多任务学习超参数：
#              loss 权重平衡（use_adaptive_loss, task_priorities）、学习率、
#              k_cross_modal（减少跨模态边密度）
#
# 注意：即使 A ≈ B，多模态设计仍有独立价值：
#   1. 一次训练同时输出 EEG 和 fMRI 重建/预测（用户不需跑两个模型）
#   2. 跨模态对齐损失（cross_modal_align）提供了 EEG-fMRI NVC 的可解释性
#   3. TwinBrain 的数字孪生干预模拟（simulate_intervention）依赖跨模态耦合
#
ablation:
  # 禁用跨模态边（EEG→fMRI graph edges）
  # false（默认）：正常建立跨模态边，完整多模态图卷积
  # true：data.modalities 仍可包含多个模态，但模态间无消息传递（独立编码）
  #        用于量化跨模态图卷积的贡献（对比"多模态联合"与"多模态独立"）
  disable_cross_modal_edges: false

# ──────────────────────────────────────────────────────────────────────────
# 七、输出配置
# ──────────────────────────────────────────────────────────────────────────
output:
  output_dir: "outputs"
  experiment_name: "twinbrain_v5"
  save_graphs: true
  save_predictions: true
  log_level: "INFO"

# ──────────────────────────────────────────────────────────────────────────
# 八、设备配置
# ──────────────────────────────────────────────────────────────────────────
#
# ★ GPU 内存配置速查表（V5.49 修正）
# ─────────────────────────────────────────────────────────────────────────
# ⚠ backward 峰值显存分析（windowed EEG T=500, fMRI T=50, H=128, 4层, 3边）：
#   GC=false：autograd 同时存储全部 12 次 propagate() 激活 ≈ 11.6 GB → 8GB OOM ❌
#   GC=true + chunk=null：backward 每次只重计算 1 个 propagate() ≈ 2.1 GB → 安全 ✅
#   GC=true + chunk=64： backward 峰值 ≈ 0.4 GB → 更安全，但 8× Python overhead
#
# ✅ 8GB GPU（RTX 3070/3080/4070/4080 等）当前默认：
#   model.temporal_chunk_size: null            ← 单次 propagate（无 Python overhead）
#   training.use_gradient_checkpointing: true  ← 必须（backward 峰值 2.1GB vs 无GC的11.6GB）
#   windowed_sampling.enabled: true（已启用）
#   windowed_sampling.fmri_window_size: 50
#   training.gradient_accumulation_steps: 4
#   → 支持 4-8 被试 × 约 5 窗口/被试 ≈ 20-40 样本/epoch
#   → 速度代价：GC 约 +40% backward 时间（重计算）；单次 propagate 无 Python 分块 overhead
#
# ✅ 速度最优（16GB+ GPU）：
#   model.temporal_chunk_size: null
#   training.use_gradient_checkpointing: false ← 可关闭（backward 峰值 11.6GB < 16GB）
#
# ⚠ V5.47 的错误配置（已修复）：
#   temporal_chunk_size: 64 + use_gradient_checkpointing: true =
#   EEG T=500, 4层×3边×8块 = 192 propagate() 调用/step → 16× 更慢
#
# ⚠ V5.48/V5.49 的认知错误（已记录在 AGENTS.md）：
#   「GPU allocated=0.18GB → 无内存压力 → GC=false 安全」是错误推断。
#   allocated=0.18GB 是 backward 完成后的稳定状态读数，不是 backward 中的峰值。
#   backward 峰值（11.6GB）远高于稳定状态，8GB GPU 必然 OOM。
#
# 8GB GPU，遭遇 CUDA OOM 时（逐步回退）：
#   1. 确认 training.use_gradient_checkpointing: true（必须，峰值从 11.6GB 降至 2.1GB）
#   2. 设 model.temporal_chunk_size: 64（峰值降至 0.4GB，但 8× Python overhead）
#   3. 设 model.temporal_chunk_size: 32（峰值降至 0.2GB，16× overhead，极限场景）
#   4. 减小 model.k_dynamic_neighbors（10 → 5）：E 减少 -33%，峰值比例下降
#   5. 设 model.use_dynamic_graph: false：去除动态边
#
# 16GB GPU（RTX 3080 Ti / RTX 4080 / etc.）：
#   model.hidden_channels: 128
#   model.temporal_chunk_size: null
#   training.use_gradient_checkpointing: false
#   windowed_sampling.fmri_window_size: 80   ← 可加大窗口
#   model.prediction_steps: 26           ← floor(80×1/3)
#   → 支持 8-16 被试
#
# 32GB GPU（RTX 3090 / A6000 / etc.）：
#   model.hidden_channels: 256           ← 更大模型
#   model.temporal_chunk_size: null
#   training.use_gradient_checkpointing: false
#   windowed_sampling.fmri_window_size: 100
#   model.prediction_steps: 33           ← floor(100×1/3)
#   → 支持 16+ 被试
#
# 如果 OOM（速度影响针对 EEG T=500；fMRI T=50 时分块代价远小于此）：
#   1. 确认 training.use_gradient_checkpointing: true（约 +40% 时间，峰值 -83%：11.6→2.1GB）
#   2. 设 model.temporal_chunk_size: 64（约 +8× Python overhead，峰值 -96%：11.6→0.4GB）
#   3. 设 model.temporal_chunk_size: 32（约 +16× Python overhead，峰值 0.2GB）
#   4. 减小 windowed_sampling.fmri_window_size（50 → 30）
#      ⚠ 同步调整 prediction_steps = floor(fmri_window_size × 1/3) = floor(30×1/3) = 10
#   5. 减小 model.hidden_channels（128 → 64）
#   6. 减小 model.k_dynamic_neighbors（10 → 5）
#
# 调整 fmri_window_size 后的 prediction_steps 建议：
#   非对称设计（V5.44）：EEG 通常有更多 T_fut，可以用更大的 prediction_steps。
#   fMRI 约束：超出 T_fut_fmri 的步骤自动截断（无梯度），不影响 EEG 的监督质量。
#   fmri_window_size=30  → T_fut_fmri ≤ 10，建议 prediction_steps=30-50（EEG 主导）
#   fmri_window_size=50  → T_fut_fmri ≤ 17，建议 prediction_steps=50（当前默认）
#   fmri_window_size=80  → T_fut_fmri ≤ 26，建议 prediction_steps=50-80
#   fmri_window_size=100 → T_fut_fmri ≤ 33，建议 prediction_steps=50-100
# ─────────────────────────────────────────────────────────────────────────
device:
  # 设备类型："cuda"（GPU）/ "cpu"（CPU）/ "cuda:0"（指定 GPU）
  type: "cuda"

  # GPU 内存规格（仅用于日志提示，不影响实际分配）
  # ★ 这是 8GB 默认配置。更大显存请使用对应的覆盖配置：
  #   16 GB → python main.py --config configs/config_16gb.yaml
  #   32 GB → python main.py --config configs/config_32gb.yaml
  # 覆盖配置会自动深度合并到此默认配置之上，只覆盖与显存相关的字段。
  gpu_memory: "8GB"

  # 混合精度训练（AMP）——约 2× 速度提升，无精度损失
  # 建议：true（支持 CUDA 的 GPU 均推荐启用）。
  use_amp: True

  # torch.compile()（PyTorch 2.0+，约 20–40% 加速）
  # ⚠ 需要 Triton，Windows 不支持。Linux/macOS 且确认 `import triton` 成功后再开启。
  use_torch_compile: False
  compile_mode: "reduce-overhead"  # Options: default, reduce-overhead, max-autotune
